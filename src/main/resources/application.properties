# Application Metadata
spring.application.name=product-manager-mcp

# MCP Server Identity
spring.ai.mcp.server.title=Product Warehouse
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-endpoint=/sse

# Railway uses PORT env var
server.port=${PORT:8080}
spring.main.banner-mode=off
spring.jackson.default-property-inclusion=non_null

logging.level.com.mcp.mcpserver=DEBUG
logging.level.org.springframework.ai.mcp=INFO
http.client.force.use.lb.url=true